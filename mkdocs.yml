site_name: colabctl
site_description: Durable, cost-aware, agent-native control of Google Colab + other GPU backends.
repo_url: https://github.com/mandipadk/colabctl
repo_name: mandipadk/colabctl
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Light mode }

plugins:
  - search
  # Worked examples are executed at build time, so a stale snippet fails the docs CI job.
  - markdown-exec
  # Auto-generated API reference from the package's own docstrings + type hints.
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            members_order: source
            separate_signature: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - toc: { permalink: true }

nav:
  - Home: index.md
  - Examples: examples.md
  - Backends: backends.md
  - Architecture: architecture.md
  - API reference: api.md
  - Deployment: deployment.md

# Strategy/roadmap docs are dev-facing, not for the public site (plan-100x.md is also gitignored).
exclude_docs: |
  plan*.md

# Build with: uvx --with-requirements <docs deps> mkdocs build  (or: uv run --group docs mkdocs serve)
